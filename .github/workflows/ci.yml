name: MintlyLib CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: mintlylib-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Build package
        run: npm run build:ci

      - name: Validate package contents
        run: npm run pack:check
